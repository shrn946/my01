services:
  postgres:
    image: postgres:16-alpine
    container_name: portfolio-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio_dev
    ports:
      - "5433:5432"
    volumes:
      - portfolio_postgres_local_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio -d portfolio"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  portfolio_postgres_local_data:
